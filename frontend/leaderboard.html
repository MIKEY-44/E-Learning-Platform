<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Leaderboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
    <nav class="navbar">
        <div class="logo">Best Free Courses</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="courses.html">Courses</a></li>
            <li><a href="dashboard.html">My Courses</a></li>
            <li><button id="themeToggle">🌙</button></li>
        </ul>
    </nav>
</header>

<section style="padding: 60px 20px; max-width: 800px; margin: auto;">
    <div style="background: var(--bg-secondary); padding: 40px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); backdrop-filter: blur(10px);">
        <h1 style="text-align: center; margin-bottom: 30px; font-size: 2.5rem;">🌍 Global Leaderboard</h1>
        <p style="text-align: center; color: var(--text-secondary); margin-bottom: 30px;">Complete courses and lessons to earn points and climb the ranks!</p>
        
        <div id="leaderboardContainer" style="display: flex; flex-direction: column; gap: 15px;">
            <h2 style="text-align: center;">Loading Rankings...</h2>
        </div>
    </div>
</section>

<script>
    fetch("http://localhost:8080/api/users/leaderboard")
        .then(res => res.json())
        .then(users => {
            document.getElementById("leaderboardContainer").innerHTML = users.map((u, i) => `<div style="display: flex; align-items: center; justify-content: space-between; background: ${i === 0 ? '#ffc10722' : 'rgba(255,255,255,0.05)'}; padding: 15px 25px; border-radius: 10px; border-left: 5px solid ${i === 0 ? '#ffc107' : i === 1 ? '#c0c0c0' : i === 2 ? '#cd7f32' : '#38bdf8'}; font-size: 1.2rem;"><div><strong style="margin-right: 15px; color: ${i === 0 ? '#ffc107' : 'inherit'};">#${i + 1}</strong> ${u.name}</div><div style="font-weight: bold; color: #38bdf8;">${u.points} 🏆</div></div>`).join("");
        });
</script>
<script src="js/app.js"></script>
</body>
</html>
