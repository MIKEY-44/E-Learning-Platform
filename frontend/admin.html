<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Admin Panel</title>

    <link rel="stylesheet"
          href="css/style.css">

    <script>
        const loggedInUser = JSON.parse(localStorage.getItem("loggedInUser"));
        if (!loggedInUser || loggedInUser.role !== "ADMIN") {
            alert("Access Denied. You must be an Administrator to view this page.");
            window.location.href = "index.html";
        }
    </script>

</head>

<body>

<header>

    <nav class="navbar">

        <div class="logo">
            Admin Dashboard
        </div>

        <ul class="nav-links">

            <li><a href="index.html">Home</a></li>

            <li><a href="courses.html">Courses</a></li>

            <li><a href="dashboard.html">My Courses</a></li>
            <li>
    <button id="themeToggle">
        🌙
    </button>
</li>

        </ul>

    </nav>

</header>

<section class="admin-section">

    <div style="grid-column: 1 / -1; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; display: flex; flex-direction: column; align-items: center;">
        <h1>Platform Analytics</h1>
        <div style="display: flex; gap: 40px; margin-bottom: 30px; text-align: center;">
            <div><h2 id="statUsers" style="color: #38bdf8; font-size: 2.5rem;">0</h2><p>Total Users</p></div>
            <div><h2 id="statCourses" style="color: #ffc107; font-size: 2.5rem;">0</h2><p>Total Courses</p></div>
            <div><h2 id="statEnrollments" style="color: #28a745; font-size: 2.5rem;">0</h2><p>Total Enrollments</p></div>
        </div>
    </div>

    <div class="admin-form-container">

        <h1>Add New Course</h1>

        <form id="courseForm">

            <input
                type="text"
                id="title"
                placeholder="Course Title"
                required
            >

            <input
                type="text"
                id="instructor"
                placeholder="Instructor"
                required
            >

            <input
                type="text"
                id="duration"
                placeholder="Duration"
                required
            >

            <input
                type="text"
                id="category"
                placeholder="Category"
                required
            >

            <input
                type="text"
                id="level"
                placeholder="Level"
                required
            >

            <input
                type="text"
                id="youtubeId"
                placeholder="YouTube Video ID"
                required
            >

            <input
                type="text"
                id="thumbnail"
                placeholder="Thumbnail URL"
                required
            >

            <textarea
                id="description"
                placeholder="Description"
                required>
            </textarea>

            <button type="submit">
                Add Course
            </button>

        </form>

    </div>

    <div class="admin-course-list">

        <h1>Manage Courses</h1>

        <button onclick="insertDemoCourses()" style="margin-bottom: 20px; padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer;">
            Insert 200 Demo Courses
        </button>

        <div id="adminCourses"></div>

    </div>

</section>

<script src="js/courses-data.js"></script>
<script src="js/admin.js"></script>

<script src="js/app.js"></script>
</body>
</html>
