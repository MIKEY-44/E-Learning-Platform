<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

<div class="auth-container">

    <form class="auth-form"
          id="loginForm">

        <h1>Welcome Back</h1>

        <input
            type="email"
            id="loginEmail"
            placeholder="Email"
            required
        >

        <input
            type="password"
            id="loginPassword"
            placeholder="Password"
            required
        >

        <button type="submit">
            Login
        </button>

        <p>
            Don't have an account?
            <a href="signup.html">
                Signup
            </a>
        </p>

        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ddd;">
        
        <!-- Google Sign-In Button -->
        <script src="https://accounts.google.com/gsi/client" async defer></script>
        <div id="g_id_onload"
             data-client_id="931030573085-m9bovg2qn97s4it1u7oko58m6opeq2u2.apps.googleusercontent.com"
             data-callback="handleGoogleLogin">
        </div>
        <div class="g_id_signin" data-type="standard" data-theme="outline" data-size="large" style="display: flex; justify-content: center;"></div>

    </form>

</div>

<script src="js/auth.js"></script>

<script src="js/app.js"></script>
</body>
</html>
